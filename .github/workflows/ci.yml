name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  structure:
    name: package.xml / colcon list (jazzy)
    runs-on: ubuntu-24.04
    container:
      image: osrf/ros:jazzy-desktop
    steps:
      - uses: actions/checkout@v4
        with:
          path: src/texnitis_mbf_plugins
      - name: Install tools
        shell: bash
        run: |
          apt-get update
          apt-get install -y python3-vcstool python3-colcon-common-extensions xmllint || \
              apt-get install -y python3-vcstool python3-colcon-common-extensions libxml2-utils
      - name: vcs import move_base_flex
        shell: bash
        run: |
          cd $GITHUB_WORKSPACE
          vcs import src < src/texnitis_mbf_plugins/third_party/move_base_flex.repos
      - name: colcon list shows our packages
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          cd $GITHUB_WORKSPACE
          colcon list --packages-up-to texnitis_mbf_bringup
      - name: package.xml well-formed
        shell: bash
        run: |
          for pkg in src/texnitis_mbf_plugins/texnitis_mbf_*/package.xml; do
              echo "checking $pkg"
              xmllint --noout "$pkg"
          done
      - name: plugin descriptions well-formed
        shell: bash
        run: |
          for plugin in src/texnitis_mbf_plugins/texnitis_mbf_*/plugins.xml; do
              [ -f "$plugin" ] || continue
              echo "checking $plugin"
              xmllint --noout "$plugin"
          done

  python:
    name: python utils + tools (lint + pytest)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml
      - name: AST parse python sources
        run: |
          python - <<'PY'
          import ast, sys
          from pathlib import Path

          ok = True
          for p in Path('.').rglob('*.py'):
              if any(part.startswith(('build', 'install', '.venv')) for part in p.parts):
                  continue
              try:
                  ast.parse(p.read_text())
                  print(f'{p}: ok')
              except SyntaxError as exc:
                  print(f'{p}: SYNTAX ERROR {exc}')
                  ok = False
          sys.exit(0 if ok else 1)
          PY
      - name: Pytest (texnitis_mbf_tools)
        run: pytest texnitis_mbf_tools/test -v

  yaml-and-launch:
    name: YAML lint + launch.py syntax
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      - name: YAML files parse
        run: |
          python - <<'PY'
          import sys, yaml
          from pathlib import Path
          ok = True
          patterns = ('texnitis_mbf_bringup/config/*.yaml',
                      'demo/maps/*.yaml',
                      'demo/waypoints/*.yaml',
                      'third_party/*.repos')
          for pat in patterns:
              for path in Path('.').glob(pat):
                  try:
                      yaml.safe_load(path.read_text())
                      print(f'{path}: ok')
                  except yaml.YAMLError as exc:
                      print(f'{path}: YAML ERROR {exc}')
                      ok = False
          sys.exit(0 if ok else 1)
          PY
      - name: launch.py syntax (ast.parse only — full launch eval needs ROS)
        run: |
          python - <<'PY'
          import ast, sys
          from pathlib import Path
          ok = True
          for p in Path('.').rglob('*.launch.py'):
              try:
                  ast.parse(p.read_text())
                  print(f'{p}: ok')
              except SyntaxError as exc:
                  print(f'{p}: SYNTAX ERROR {exc}')
                  ok = False
          sys.exit(0 if ok else 1)
          PY

  # A real `colcon build` job that needs both repos checked out lives in
  # ../tools/local-build.md as a developer recipe. We do not run it here
  # because texnitis_nav_core is private and giving a CI workflow a PAT
  # that can clone private repos is heavier than the benefit at this
  # stage. Once nav_core goes public (or a dedicated NAV_CORE_TOKEN is
  # provisioned) we'll uncomment this job.
  #
  # build:
  #   name: colcon build
  #   ...
